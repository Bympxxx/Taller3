<nav class="fixed w-full z-20 top-0 start-0 bg-gray-950/95 backdrop-blur-sm border-b border-gray-800">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

    <a routerLink="/" class="flex items-center space-x-2">
      <span class="text-2xl">🎮</span>
      <span class="text-xl font-black text-white tracking-wider">
        Game<span class="text-purple-400">Over</span>
      </span>
    </a>

    <div class="flex md:order-2 items-center space-x-3">

      <ng-container *ngIf="usuarioLogueado(); else noLogueado">
        <button (click)="cerrarSesion()"
                class="bg-red-600/20 hover:bg-red-600/40 text-red-400 border border-red-600/30
                       font-semibold text-sm px-4 py-2 rounded-lg transition-all duration-300 hidden sm:block">
          Cerrar sesión
        </button>
      </ng-container>

      <ng-template #noLogueado>
        <a routerLink="/login"
           class="bg-gray-800 hover:bg-gray-700 text-white font-semibold
                  text-sm px-4 py-2 rounded-lg transition-all duration-300 hidden sm:block">
          Iniciar sesión
        </a>
      </ng-template>

      <a routerLink="/suscripcion"
         class="bg-purple-600 hover:bg-purple-500 text-white font-semibold
                text-sm px-4 py-2 rounded-lg transition-all duration-300 hidden sm:block">
        Suscripción
      </a>

      <button (click)="toggleMenu()"
              class="inline-flex items-center p-2 w-10 h-10 justify-center
                     text-gray-400 rounded-lg md:hidden hover:bg-gray-800
                     focus:outline-none focus:ring-2 focus:ring-purple-500">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/>
        </svg>
      </button>
    </div>

    <div [class.hidden]="!menuOpen"
         class="items-center justify-between w-full md:flex md:w-auto md:order-1">
      <ul class="flex flex-col p-4 md:p-0 mt-4 md:mt-0 md:flex-row md:space-x-6
                 border border-gray-700 rounded-lg bg-gray-900 md:border-0 md:bg-transparent">
        <li>
          <a routerLink="/" routerLinkActive="text-purple-400" [routerLinkActiveOptions]="{exact:true}"
             class="block py-2 px-3 text-gray-300 hover:text-purple-400 transition-colors duration-200 md:p-0 font-medium">
            Home
          </a>
        </li>
        <li>
          <a routerLink="/nosotros" routerLinkActive="text-purple-400"
             class="block py-2 px-3 text-gray-300 hover:text-purple-400 transition-colors duration-200 md:p-0 font-medium">
            Nosotros
          </a>
        </li>
        <li>
          <a routerLink="/tienda" routerLinkActive="text-purple-400"
             class="block py-2 px-3 text-gray-300 hover:text-purple-400 transition-colors duration-200 md:p-0 font-medium">
            Tienda
          </a>
        </li>
        <li *ngIf="usuarioLogueado()">
          <a routerLink="/registros" routerLinkActive="text-purple-400"
             class="block py-2 px-3 text-gray-300 hover:text-purple-400 transition-colors duration-200 md:p-0 font-medium">
            Registros
          </a>
        </li>

        <li *ngIf="esAdmin()">
          <a routerLink="/admin" routerLinkActive="text-purple-400"
             class="block py-2 px-3 text-gray-300 hover:text-purple-400 transition-colors duration-200 md:p-0 font-medium">
            Admin
          </a>
        </li>

        <li class="sm:hidden" *ngIf="!usuarioLogueado()">
          <a routerLink="/login" class="block py-2 px-3 text-gray-300 font-medium">
            Iniciar sesión
          </a>
        </li>
        <li class="sm:hidden">
          <a routerLink="/suscripcion" class="block py-2 px-3 text-purple-400 font-medium">
            Suscripción
          </a>
        </li>
        <li class="sm:hidden" *ngIf="usuarioLogueado()">
          <button (click)="cerrarSesion()" class="block py-2 px-3 text-red-400 font-medium">
            Cerrar sesión
          </button>
        </li>
      </ul>
    </div>

  </div>
</nav>

<div class="h-16"></div>
