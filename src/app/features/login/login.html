<div class="min-h-screen flex items-center justify-center pt-16
            bg-gradient-to-br from-purple-900/40 via-gray-950 to-blue-900/40">


  <div class="w-full max-w-sm px-4 py-8">


    <div class="w-20 h-20 rounded-full border-2 border-purple-500/40
                bg-gray-900/60 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-purple-400" fill="none" stroke="currentColor"
           stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M6 12h2m4-4v2m0 4v2m4-4h2M5 8h14a1 1 0 0 1 1 1v6
             a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/>
      </svg>
    </div>


    <div class="text-center mb-6">
      <h1 class="text-2xl font-black text-white">
        Game<span class="text-purple-400">Over</span>
      </h1>
      <p class="text-gray-400 text-sm mt-1">Inicia sesion para continuar</p>
    </div>


    <div *ngIf="errorMsg"
         class="bg-red-500/10 border border-red-500/30 text-red-400
                rounded-xl px-4 py-3 text-sm text-center mb-4">
      {{ errorMsg }}
    </div>


    <form (ngSubmit)="onLogin()" class="flex flex-col gap-3">

      <input type="email" [(ngModel)]="email" name="email"
             placeholder="Correo electronico"
             class="w-full bg-gray-900/60 border border-gray-700/50 text-white
                    rounded-2xl px-4 py-3.5 text-sm placeholder-gray-500
                    focus:outline-none focus:border-purple-500/70 transition-all"/>

      <input [type]="showPassword ? 'text' : 'password'"
             [(ngModel)]="password" name="password"
             placeholder="Contrasena"
             class="w-full bg-gray-900/60 border border-gray-700/50 text-white
                    rounded-2xl px-4 py-3.5 text-sm placeholder-gray-500
                    focus:outline-none focus:border-purple-500/70 transition-all"/>

      <button type="button" (click)="showPassword = !showPassword"
              class="text-gray-500 text-xs text-right hover:text-purple-400 transition-colors">
        {{ showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena' }}
      </button>

      <button type="submit" [disabled]="loading"
              class="w-full bg-purple-600 hover:bg-purple-500 disabled:bg-purple-800
                     disabled:cursor-not-allowed text-white font-bold py-3.5
                     rounded-2xl transition-all hover:scale-[1.02] text-sm tracking-wide">
        {{ loading ? 'Iniciando...' : 'Iniciar Sesion' }}
      </button>

    </form>
  </div>
</div>
